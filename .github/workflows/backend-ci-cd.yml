name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set Environment Variables
        run: |
          echo "FLASK_SECRET_KEY=test_secret_key" >> $env:GITHUB_ENV
          echo "GOOGLE_CLIENT_ID=dummy_client_id" >> $env:GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=dummy_client_secret" >> $env:GITHUB_ENV
          echo "HF_API_TOKEN=dummy_hf_token" >> $env:GITHUB_ENV

      - name: Lint with flake8
        working-directory: backend
        run: |
          pip install flake8
          flake8 OAuth.py --max-line-length=120 --ignore=E501,W503

      - name: Check Syntax
        working-directory: backend
        run: |
          python -m py_compile OAuth.py
          echo "Syntax check passed"
          
      - name: Lint with flake8
        working-directory: backend
        run: |
          pip install flake8
          flake8 OAuth.py --max-line-length=120 --ignore=E501,W503,E241