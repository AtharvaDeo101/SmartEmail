name: Backend CI/CD

on:
  push:
    branches:
      - '**'

jobs:
  lint:
    name: Lint
    runs-on: windows-latest        # ✅ Windows fine for Python linting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 black isort

      - name: Run flake8 (lint)
        run: flake8 backend/ --max-line-length=120 --exclude=backend/__pycache__

      - name: Run black (format check)
        run: black --check backend/

      - name: Run isort (import order check)
        run: isort --check-only --profile=black --line-length=120 backend/

  test:
    name: Test
    runs-on: windows-latest        # ✅ Windows fine for pytest
    needs: lint

    env:
      FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
      FRONTEND_URL: http://localhost:3000/
      REDIRECT_URI: http://localhost:5000/oauth2callback

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest backend/tests/ -v --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest         # ✅ Linux required for Linux Docker images
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: docker build -t smartemail-backend:${{ github.sha }} -f Dockerfile .

