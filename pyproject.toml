[tool.black]
line-length = 120
target-version = ["py311"]
exclude = '''
/(
    \.git
  | __pycache__
  | flask_session
  | venv
  | \.venv
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip_glob = ["flask_session/*", "flask_session_test/*"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"